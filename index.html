<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Settings</title>
    <link rel="stylesheet" href="05.css" />
  </head>
  <body>
    <main class="profile-container">
      <div class="avatar-wrapper">
        <div class="avatar-circle">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
        </div>
      </div>

      <h1>Profile Settings</h1>

      <form>
        <section class="settings-card account-section">
          <h2 class="section-title">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              ></path>
            </svg>
            Account
          </h2>
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" value="Alex Johnson" />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" value="alex@example.com" />
          </div>
          <div class="form-group">
            <label for="language">Language</label>
            <select id="language">
              <option>English (US)</option>
              <option>Tiếng Việt</option>
              <option>日本語</option>
            </select>
          </div>
        </section>

        <section class="settings-card preferences-card">
          <h2 class="section-title">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"
              ></path>
            </svg>
            Preferences
          </h2>
          <label class="checkbox-group">
            <input type="checkbox" checked /> Email notifications
          </label>
          <label class="checkbox-group">
            <input type="checkbox" /> Marketing updates
          </label>
          <div class="form-group" style="margin-top: 15px">
            <label for="theme">Theme</label>
            <select id="theme">
              <option>System Default</option>
              <option>Light Mode</option>
              <option>Dark Mode</option>
            </select>
          </div>
        </section>

        <section class="settings-card security-card">
          <h2 class="section-title">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              ></path>
            </svg>
            Security
          </h2>
          <div class="security-list">
            <button type="button" class="btn-action">Change Password</button>
            <button type="button" class="btn-action">
              Enable Two-Factor Authentication
            </button>
          </div>
        </section>

        <div class="footer-actions">
          <button type="button" class="btn-square btn-cancel">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2.5"
            >
              <path d="M6 18L18 6M6 6l12 12"></path>
            </svg>
            Cancel
          </button>
          <button type="submit" class="btn-square btn-save">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2.5"
            >
              <path d="M5 13l4 4L19 7"></path>
            </svg>
            Save Changes
          </button>
        </div>
      </form>
    </main>
  </body>
</html>
